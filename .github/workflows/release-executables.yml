name: Release Executables

on:
    workflow_dispatch:
        inputs:
            version:
                description: Optional release version label (for example 0.1.8 or v0.1.8)
                required: false
                type: string
    push:
        tags:
            - "v*"

permissions:
    contents: read

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
    group: release-executables-${{ github.ref }}
    cancel-in-progress: true

jobs:
    resolve-version:
        name: Resolve Version
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 5
        outputs:
            version: ${{ steps.version.outputs.version }}
        steps:
            - name: Checkout
              uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
              with:
                  persist-credentials: false
                  sparse-checkout: Cargo.toml
                  sparse-checkout-cone-mode: false

            - name: Resolve release version
              id: version
              env:
                  RAW_RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version || '' }}
              run: |
                  set -euo pipefail
                  raw_version="${RAW_RELEASE_VERSION}"
                  if [[ -z "${raw_version}" ]]; then
                    raw_version="$(awk -F'"' '/^version = "/ {print $2; exit}' Cargo.toml)"
                  fi
                  normalized_version="${raw_version#v}"
                  if [[ ! "${normalized_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "Invalid release version: ${raw_version}" >&2
                    exit 1
                  fi
                  echo "version=${normalized_version}" >> "${GITHUB_OUTPUT}"

    verify-release-state:
        name: Verify Release State
        needs: [resolve-version]
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 10
        env:
            RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        steps:
            - name: Checkout
              uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
              with:
                  persist-credentials: false

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
              with:
                  toolchain: stable

            - name: Verify tag matches workspace version
              if: ${{ github.event_name == 'push' }}
              run: |
                  set -euo pipefail
                  workspace_version="$(awk -F'"' '/^version = "/ {print $2; exit}' Cargo.toml)"
                  if [[ "${workspace_version}" != "${RELEASE_VERSION}" ]]; then
                    echo "Tag version (${RELEASE_VERSION}) does not match Cargo.toml (${workspace_version})." >&2
                    exit 1
                  fi

            - name: Verify Cargo.lock is up to date
              run: cargo metadata --format-version 1 --locked > /dev/null

    build-linux:
        name: Build Linux (${{ matrix.target }})
        needs: [resolve-version, verify-release-state]
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        env:
            RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: blacksmith-4vcpu-ubuntu-2404
                      target: x86_64-unknown-linux-gnu
                    - runner: blacksmith-4vcpu-ubuntu-2404-arm
                      target: aarch64-unknown-linux-gnu
        steps:
            - name: Checkout
              uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
              with:
                  persist-credentials: false

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
              with:
                  toolchain: stable

            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              with:
                  workspaces: . -> target/releases

            - name: Build and package Linux release artifacts
              run: scripts/package-linux-release.sh --target "${{ matrix.target }}" --version "${RELEASE_VERSION}"

            - name: Upload Linux release artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: release-${{ matrix.target }}
                  path: |
                      dist/releases/*.tar.gz
                      dist/releases/*.tar.gz.sha256
                      dist/releases/*.deb
                      dist/releases/*.deb.sha256
                  if-no-files-found: error
                  retention-days: 14

    build-macos:
        name: Build macOS (${{ matrix.target }})
        needs: [resolve-version, verify-release-state]
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        env:
            RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-15-intel
                      target: x86_64-apple-darwin
                    # Blacksmith macOS runners are Apple Silicon only, so keep
                    # the x86_64 artifact on GitHub-hosted Intel macOS.
                    - runner: blacksmith-6vcpu-macos-15
                      target: aarch64-apple-darwin
        steps:
            - name: Checkout
              if: startsWith(matrix.runner, 'blacksmith-')
              uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
              with:
                  persist-credentials: false

            - name: Checkout
              if: ${{ !startsWith(matrix.runner, 'blacksmith-') }}
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
              with:
                  persist-credentials: false

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
              with:
                  toolchain: stable

            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

            - name: Build and package macOS release artifacts
              run: scripts/package-macos-release.sh --target "${{ matrix.target }}" --version "${RELEASE_VERSION}"

            - name: Upload macOS release artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: release-${{ matrix.target }}
                  path: |
                      dist/releases/*.tar.gz
                      dist/releases/*.tar.gz.sha256
                  if-no-files-found: error
                  retention-days: 14

    build-windows:
        name: Build Windows (${{ matrix.target }})
        needs: [resolve-version, verify-release-state]
        runs-on: ${{ matrix.runner }}
        timeout-minutes: 60
        env:
            RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: blacksmith-4vcpu-windows-2025
                      target: x86_64-pc-windows-msvc
        steps:
            - name: Checkout
              uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
              with:
                  persist-credentials: false

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
              with:
                  toolchain: stable

            - name: Restore Rust cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
              with:
                  workspaces: . -> target/releases

            - name: Build and package Windows release artifacts
              shell: pwsh
              run: scripts/package-windows-release.ps1 -Target "${{ matrix.target }}" -Version "$env:RELEASE_VERSION"

            - name: Upload Windows release artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
              with:
                  name: release-${{ matrix.target }}
                  path: |
                      dist/releases/*.zip
                      dist/releases/*.zip.sha256
                  if-no-files-found: error
                  retention-days: 14

    publish:
        name: Publish GitHub Release
        if: ${{ github.event_name == 'push' }}
        needs:
            - build-linux
            - build-macos
            - build-windows
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 15
        permissions:
            contents: write
        steps:
            - name: Download release artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Publish release assets
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
              with:
                  files: |
                      release-assets/*.tar.gz
                      release-assets/*.tar.gz.sha256
                      release-assets/*.zip
                      release-assets/*.zip.sha256
                      release-assets/*.deb
                      release-assets/*.deb.sha256
                  fail_on_unmatched_files: true
                  generate_release_notes: true

    update-homebrew-tap:
        name: Update Homebrew Tap
        if: ${{ github.event_name == 'push' }}
        needs:
            - resolve-version
            - publish
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 15
        permissions:
            contents: read
        env:
            HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
            RELEASE_VERSION: ${{ needs.resolve-version.outputs.version }}
        steps:
            - name: Skip when tap token is not configured
              if: env.HOMEBREW_TAP_TOKEN == ''
              run: echo "HOMEBREW_TAP_TOKEN not configured; skipping Homebrew tap refresh."

            - name: Download release artifacts
              if: env.HOMEBREW_TAP_TOKEN != ''
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Checkout Homebrew tap
              if: env.HOMEBREW_TAP_TOKEN != ''
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
              with:
                  repository: AgenticHighway/homebrew-tap
                  ref: main
                  token: ${{ env.HOMEBREW_TAP_TOKEN }}
                  path: homebrew-tap

            - name: Update Formula/kelvinclaw.rb
              if: env.HOMEBREW_TAP_TOKEN != ''
              working-directory: homebrew-tap
              run: |
                  set -euo pipefail
                  export MACOS_ARM64_SHA="$(sha256sum ../release-assets/kelvinclaw-${RELEASE_VERSION}-macos-arm64.tar.gz | awk '{print $1}')"
                  export MACOS_X86_64_SHA="$(sha256sum ../release-assets/kelvinclaw-${RELEASE_VERSION}-macos-x86_64.tar.gz | awk '{print $1}')"
                  export LINUX_ARM64_SHA="$(sha256sum ../release-assets/kelvinclaw-${RELEASE_VERSION}-linux-arm64.tar.gz | awk '{print $1}')"
                  export LINUX_X86_64_SHA="$(sha256sum ../release-assets/kelvinclaw-${RELEASE_VERSION}-linux-x86_64.tar.gz | awk '{print $1}')"

                  ruby <<'RUBY'
                  path = "Formula/kelvinclaw.rb"
                  text = File.read(path)

                  replacements = {
                    /version "\d+\.\d+\.\d+"/ => %(version "#{ENV.fetch("RELEASE_VERSION")}"),
                    /(macos-arm64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("MACOS_ARM64_SHA")}\"",
                    /(macos-x86_64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("MACOS_X86_64_SHA")}\"",
                    /(linux-arm64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("LINUX_ARM64_SHA")}\"",
                    /(linux-x86_64\.tar\.gz"\n\s+sha256 ")([0-9a-f]+)"/ => "\\1#{ENV.fetch("LINUX_X86_64_SHA")}\""
                  }

                  replacements.each do |pattern, replacement|
                    updated = text.sub(pattern, replacement)
                    raise "failed to update #{pattern.inspect}" if updated == text
                    text = updated
                  end

                  File.write(path, text)
                  RUBY

                  git --no-pager diff -- Formula/kelvinclaw.rb

            - name: Commit and push formula
              if: env.HOMEBREW_TAP_TOKEN != ''
              working-directory: homebrew-tap
              run: |
                  set -euo pipefail
                  if git diff --quiet -- Formula/kelvinclaw.rb; then
                    echo "Formula already up to date."
                    exit 0
                  fi

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add Formula/kelvinclaw.rb
                  git commit -m "kelvinclaw ${RELEASE_VERSION}"
                  git push origin HEAD:main
