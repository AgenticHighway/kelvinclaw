                    - img [ref=e459]
                - paragraph [ref=e461]: KelvinClaw is a Secure, Stable, and Modular Runtime for Agentic Workflows. It focuses on predictable runtime behavior, policy-driven extension loading, and a maintainable SDK surface for plugin developers.
                - paragraph [ref=e462]:
                  - text: "SDK name:"
                  - strong [ref=e463]: Kelvin Core
                  - text: .
                - paragraph [ref=e464]: "What this project includes:"
                - list [ref=e465]:
                  - listitem [ref=e466]:
                    - text: control plane (
                    - code [ref=e467]: kelvin
                    - text: "root + brain): policy, orchestration, lifecycle"
                  - listitem [ref=e468]:
                    - text: data plane (
                    - code [ref=e469]: kelvin-memory-controller
                    - text: "): RPC memory operations with security checks"
                  - listitem [ref=e470]:
                    - text: SDK (
                    - code [ref=e471]: Kelvin Core
                    - text: "): stable interfaces for plugins, tools, and runtime integration"
                  - listitem [ref=e472]: "plugin system: signed package install/verification and policy-based capability enforcement"
                - paragraph [ref=e473]: For end users, plugins are installed as packages and executed by Kelvin. They do not need to compile the Rust workspace.
